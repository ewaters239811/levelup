<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <title>Identity Collapse Index</title>
  <defs>
    <linearGradient id="ici-edge" x1="4" y1="2" x2="30" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fde68a"/>
      <stop offset="0.5" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#9a3412"/>
    </linearGradient>
    <radialGradient id="ici-bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="matrix(0 22 -22 0 16 16)">
      <stop stop-color="#292524"/>
      <stop offset="1" stop-color="#0c0a09"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#ici-bg)"/>
  <!-- outer frame: identity boundary -->
  <rect
    x="7.5"
    y="7.5"
    width="17"
    height="17"
    rx="2.5"
    transform="rotate(45 16 16)"
    fill="none"
    stroke="url(#ici-edge)"
    stroke-width="2"
  />
  <!-- inner core: collapse to center -->
  <rect
    x="12"
    y="12"
    width="8"
    height="8"
    rx="1.5"
    transform="rotate(45 16 16)"
    fill="url(#ici-edge)"
  />
</svg>
